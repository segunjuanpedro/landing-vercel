<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Juan Pedro web</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #050816;
      --card: #0f172a;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #111827 0%, #020617 60%, #000 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: linear-gradient(145deg, #020617, #020617);
      border-radius: 24px;
      padding: 32px 28px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow:
        0 20px 45px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(15, 23, 42, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    .badge {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      padding: 6px 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.9);
    }

    h1 {
      font-size: clamp(26px, 4vw, 32px);
      line-height: 1.15;
      margin-top: 4px;
    }

    h1 span {
      background: linear-gradient(120deg, #22c55e, #a3e635);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 34rem;
    }

    .image-wrapper {
      margin-top: 4px;
      width: 220px;
      height: 220px;
      border-radius: 24px;
      padding: 10px;
      background: radial-gradient(circle at top left, #22c55e33 0%, #020617 50%);
      border: 1px solid rgba(148, 163, 184, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .image-inner {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(8px);
      background: rgba(15, 23, 42, 0.8);
    }

    .image-inner::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.75);
      pointer-events: none;
    }

    .image-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.02);
      transition: transform 220ms ease-out;
    }

    .card:hover .image-inner img {
      transform: scale(1.05);
    }

    .cta {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .btn-primary {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      width: 100%;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at top left, #4ade80, #22c55e);
      color: #052e16;
      box-shadow:
        0 12px 30px rgba(34, 197, 94, 0.45),
        0 0 0 1px rgba(22, 163, 74, 0.7);
      transition:
        transform 120ms ease-out,
        box-shadow 120ms ease-out,
        filter 120ms ease-out;
    }

    .btn-primary span.icon {
      font-size: 18px;
      line-height: 1;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        0 18px 40px rgba(34, 197, 94, 0.6),
        0 0 0 1px rgba(22, 163, 74, 0.8);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow:
        0 8px 20px rgba(34, 197, 94, 0.4),
        0 0 0 1px rgba(22, 163, 74, 0.9);
    }

    .tiny {
      font-size: 11px;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 18px;
        border-radius: 20px;
      }

      .image-wrapper {
        width: 190px;
        height: 190px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">
      <span class="badge-dot"></span>
      Proyecto en línea
    </div>

    <h1>
      Testeando<br />
      soy <span>Juan Pedro</span>
    </h1>

    <p class="subtitle">
      Testeando vercel + dominio
    </p>

    <div class="image-wrapper">
      <div class="image-inner">
        <!-- Cambiá la ruta por tu propia imagen -->
        <img src="images/Hero.jpg" alt="Imagen principal del proyecto" />
      </div>
    </div>

    <div class="cta">
      <button class="btn-primary">
        <span class="icon">➜</span>
        Ver más información
      </button>
      <span class="tiny">(Este botón no hace nada)</span>
    </div>
  </main>
</body>
</html>
