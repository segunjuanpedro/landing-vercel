<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Juan Pedro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="images/favicon" href="/images/favicon.ico">
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      border-radius: 24px;
      padding: 32px 28px;
      max-width: 320px;
      width: 100%;
      border: solid 2px #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    h1 {
      font-size: clamp(26px, 4vw, 32px);
      line-height: 1.15;
      margin-top: 4px;
    }

    h1 span {
      background: #333;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 34rem;
    }

    .image-wrapper {
      margin-top: 4px;
      width: 220px;
      height: 220px;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .image-inner {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(8px);
    }

    .image-inner::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .image-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.02);
      transition: transform 220ms ease-out;
    }

    .card:hover .image-inner img {
      transform: scale(1.05);
    }

    .cta {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .btn-primary {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      width: center;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .btn-primary span.icon {
      font-size: 18px;
      line-height: 1;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .tiny {
      font-size: 11px;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 18px;
        border-radius: 20px;
      }

      .image-wrapper {
        width: 190px;
        height: 190px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Juan Pedro</h1>

    <p class="subtitle">
      @segunjuanpedro
    </p>

    <div class="image-wrapper">
      <div class="image-inner">
        <!-- Cambiá la ruta por tu propia imagen -->
        <img src="images/Hero.jpg" alt="Imagen principal del proyecto" />
      </div>
    </div>
  </main>
</body>
</html>
